<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIXPEN-03 Early Web Browser Emulator</title>
<style>
  :root {
    --bg: #b8b8b8;
    --case: #d8d1bd;
    --case-dark: #9b927c;
    --case-line: #4b4639;
    --screen: #fbfaf2;
    --ink: #111;
    --soft: #e9e5d5;
    --shadow: rgba(0,0,0,.28);
    --green: #116b2d;
    --red: #a30f16;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 50% 30%, #efefef 0%, #d8d8d8 42%, var(--bg) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    font-family: "Courier New", Courier, monospace;
    color: var(--ink);
  }

  .wrap {
    width: 900px;
    max-width: 96vw;
  }

  .monitor {
    background: linear-gradient(145deg, #ece6d4 0%, var(--case) 60%, #c4bba4 100%);
    border: 3px solid var(--case-line);
    border-radius: 14px;
    padding: 18px 18px 14px;
    box-shadow:
      0 16px 34px var(--shadow),
      inset 0 2px 0 rgba(255,255,255,.55);
  }

  .monitor-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 11px;
    color: #312d24;
  }

  .brand {
    font-weight: 700;
    letter-spacing: .3px;
  }

  .led {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .led-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #37a852;
    border: 1px solid #114c1f;
    box-shadow: 0 0 5px rgba(55,168,82,.65);
  }

  .bezel {
    background: #191919;
    border: 3px solid #050505;
    border-radius: 8px;
    padding: 12px;
  }

  .screen {
    width: 100%;
    height: 660px;
    background: var(--screen);
    border: 2px solid #000;
    box-shadow:
      inset 0 0 22px rgba(0,0,0,.16),
      inset 0 0 1px rgba(0,0,0,.85);
    display: grid;
    grid-template-rows: 24px 1fr 30px;
    overflow: hidden;
    position: relative;
  }

  .screen::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,.035) 0px,
        rgba(0,0,0,.035) 1px,
        transparent 1px,
        transparent 4px
      );
    opacity: .45;
    mix-blend-mode: multiply;
  }

  .bar {
    height: 24px;
    background: var(--soft);
    border-bottom: 1px solid #000;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 6px;
    padding: 3px 6px;
    font-size: 10.5px;
    position: relative;
    z-index: 2;
  }

  button {
    font-family: "Courier New", Courier, monospace;
    font-size: 10px;
    border: 1px solid #000;
    background: #fffdf4;
    padding: 1px 5px;
    cursor: pointer;
    height: 18px;
  }

  button:hover, button:focus {
    background: #111;
    color: #fffdf4;
    outline: none;
  }

  .url {
    border: 1px solid #777;
    background: #fff;
    height: 17px;
    line-height: 15px;
    padding: 0 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status {
    color: var(--green);
    font-weight: 700;
    min-width: 42px;
    text-align: right;
  }

  .status.err {
    color: var(--red);
  }

  .viewport {
    padding: 9px 10px 7px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    z-index: 2;
    font-size: 13px;
    line-height: 1.38;
    white-space: pre-wrap;
    scrollbar-width: thin;
  }

  .docname {
    position: absolute;
    right: 8px;
    top: 5px;
    font-size: 9.5px;
  }

  h1 {
    font-size: 11px;
    text-align: center;
    margin: 20px 0 14px;
    letter-spacing: .5px;
    font-weight: 700;
  }

  p {
    margin: 0 0 10px;
  }

  .menu {
    width: 92%;
    margin: 4px auto 0;
    display: grid;
    grid-template-columns: 132px 1fr;
    column-gap: 18px;
  }

  .row { display: contents; }

  .left, .right {
    padding: 5px 0;
  }

  a {
    color: #111;
    text-decoration: none;
    font-weight: 700;
    cursor: pointer;
  }

  a:hover, a:focus {
    color: #fff;
    background: #111;
    outline: none;
  }

  .hint {
    margin-top: 8px;
    border: 1px dashed #222;
    background: #fffdf8;
    padding: 5px 6px;
    font-size: 11px;
  }

  .prompt {
    background: var(--soft);
    border-top: 1px solid #000;
    display: grid;
    grid-template-columns: 1fr 82px 30px;
    align-items: center;
    gap: 5px;
    padding: 4px 6px;
    font-size: 13px;
    position: relative;
    z-index: 2;
  }

  input {
    font-family: "Courier New", Courier, monospace;
    font-size: 10px;
    border: 1px solid #000;
    height: 20px;
    padding: 1px 5px;
    background: #fff;
  }

  .copyright {
    text-align: center;
    margin-top: 10px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    color: #222;
  }

  .caption {
    text-align: center;
    margin-top: 8px;
    font-size: 10.5px;
    color: #333;
  }

  @media (max-width: 700px) {
    .wrap { width: 96vw; }
    .monitor { padding: 12px; }
    .screen { height: 390px; }
    .viewport { font-size: 9.6px; line-height: 1.32; }
    .menu { grid-template-columns: 1fr; width: 100%; }
    .left { padding-bottom: 0; }
    .right { padding-top: 0; padding-left: 16px; }
    .prompt { grid-template-columns: 1fr; height: auto; }
    button { height: 20px; }
  }
</style>
</head>

let current = "home";
let backStack = [];

const viewport = document.getElementById("viewport");
const urlBox = document.getElementById("urlBox");
const statusBox = document.getElementById("statusBox");
const command = document.getElementById("command");

function esc(s) {
  return String(s).replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#039;"
  }[ch]));
}

function setStatus(text, error=false) {
  statusBox.textContent = text;
  statusBox.className = error ? "status err" : "status";
}

function render(id, push=true) {
  const page = pages[id];
  if (!page) {
    setStatus("BAD REF", true);
    return;
  }

  if (push && current !== id) backStack.push(current);
  current = id;
  urlBox.textContent = page.url;
  setStatus("READY", false);

  let out = `<div class="docname">${esc(page.title)}</div>`;
  out += `<h1>${esc(page.heading)}</h1>`;

  for (const p of page.body) {
    out += `<p>${esc(p)}</p>`;
  }

  out += `<div class="menu">`;
  for (const link of page.links) {
    out += `
      <div class="row">
        <div class="left"><a href="#" data-target="${esc(link.target)}" data-ref="${esc(link.ref)}">${esc(link.text)}</a></div>
        <div class="right">${esc(link.desc)}</div>
      </div>`;
  }
  out += `</div>`;

  const refs = page.links.map(l => l.ref).join(", ");
  out += `<div class="hint">Available refs: ${esc(refs)}. Type a ref number, Back, Home, or Help.</div>`;

  viewport.innerHTML = out;
  viewport.scrollTop = 0;

  viewport.querySelectorAll("a[data-target]").forEach(a => {
    a.addEventListener("click", ev => {
      ev.preventDefault();
      render(a.getAttribute("data-target"));
    });
  });
}

function goBack() {
  if (!backStack.length) {
    setStatus("NO BACK", true);
    return;
  }
  const last = backStack.pop();
  render(last, false);
}

function runCommand(value) {
  const v = String(value).trim();
  const page = pages[current];

  if (!v) {
    setStatus("RETURN");
    return;
  }

  const low = v.toLowerCase();
  if (low === "back" || low === "b") {
    goBack();
    return;
  }
  if (low === "home" || low === "h" || v === "0") {
    render("home");
    return;
  }
  if (low === "help" || low === "?") {
    render("help");
    return;
  }

  const target = page.links.find(l => l.ref === v);
  if (target) {
    render(target.target);
    return;
  }

  setStatus("BAD REF", true);
}

document.getElementById("goBtn").addEventListener("click", () => {
  runCommand(command.value);
  command.value = "";
  command.focus();
});

command.addEventListener("keydown", (ev) => {
  if (ev.key === "Enter") {
    ev.preventDefault();
    runCommand(command.value);
    command.value = "";
  }
});

document.getElementById("backBtn").addEventListener("click", goBack);
document.getElementById("homeBtn").addEventListener("click", () => render("home"));
document.addEventListener("keydown", ev => {
  if (ev.altKey || ev.ctrlKey || ev.metaKey) return;
  if (ev.key === "Escape") command.focus();
});

render("home", false);
command.focus();

/* Simple built-in sanity check for navigation mapping. */
(function selfTest() {
  const homeRefs = new Set(pages.home.links.map(l => l.ref));
  if (!homeRefs.has("7") || !homeRefs.has("10") || !homeRefs.has("11") || !homeRefs.has("19")) {
    console.error("Reference mapping self-test failed.");
  }
})();
</script>
